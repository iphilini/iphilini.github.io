<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Листівка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1428;
      --mist: rgba(255, 248, 240, 0.92);
      --gold: #c9a962;
      --shadow-word: #6b5b7a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #0d0a12;
      font-family: "Cormorant Garamond", "Times New Roman", serif;
    }

    .frame {
      position: relative;
      width: min(100%, 520px);
      aspect-ratio: 3 / 4;
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 25px 80px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(255, 255, 255, 0.06) inset;
    }

    /* Небо: зеніт глибший, сутінкова дуга, теплий горизонт (розсіювання) */
    .sky {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 140% 100% at 50% -20%, rgba(30, 45, 90, 0.55) 0%, transparent 42%),
        radial-gradient(ellipse 90% 45% at 50% 100%, rgba(255, 140, 100, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse 120% 35% at 50% 98%, rgba(255, 185, 140, 0.28) 0%, transparent 45%),
        radial-gradient(ellipse 130% 80% at 15% 100%, rgba(255, 195, 150, 0.22) 0%, transparent 48%),
        radial-gradient(ellipse 100% 60% at 88% 12%, rgba(160, 185, 230, 0.2) 0%, transparent 45%),
        linear-gradient(
          168deg,
          #0e0c1a 0%,
          #15182e 14%,
          #242447 32%,
          #3d3555 48%,
          #5c5168 58%,
          #8a7a78 72%,
          #c9a882 86%,
          #ecd4b8 94%,
          #f8ead8 100%
        );
    }

    .sky::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.14'/%3E%3C/svg%3E");
      opacity: 0.55;
      mix-blend-mode: soft-light;
      pointer-events: none;
    }

    .sky::after {
      content: "";
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
      opacity: 0.35;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.72;
      pointer-events: none;
    }

    .stars svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .moon {
      position: absolute;
      top: 9%;
      right: 11%;
      width: 76px;
      height: 76px;
      z-index: 1;
      opacity: 1;
      filter:
        drop-shadow(0 0 1px rgba(255, 252, 245, 0.4))
        drop-shadow(0 0 8px rgba(255, 245, 228, 0.35))
        drop-shadow(0 0 22px rgba(255, 235, 210, 0.22))
        drop-shadow(0 0 48px rgba(200, 195, 255, 0.08));
      transform: rotate(-14deg);
    }

    .moon svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(1.5rem, 6vw, 2.75rem) clamp(1.25rem, 5vw, 2.25rem);
    }

    .ornament {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.5rem;
      opacity: 0.85;
    }

    .verse {
      color: var(--mist);
      font-size: clamp(1.15rem, 3.8vw, 1.45rem);
      font-weight: 500;
      line-height: 1.65;
      letter-spacing: 0.02em;
      text-align: center;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.35);
    }

    .verse p + p {
      margin-top: 0.85em;
    }

    .verse .whisper {
      font-style: italic;
      font-weight: 400;
      color: var(--shadow-word);
      font-size: 0.95em;
    }

    .edge-fade {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      box-shadow:
        inset 0 0 100px rgba(8, 6, 18, 0.5),
        inset 0 0 40px rgba(20, 15, 35, 0.35);
      border-radius: 4px;
    }

    .haze {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 100% 70% at 50% 100%, rgba(255, 230, 210, 0.06) 0%, transparent 55%);
      mix-blend-mode: screen;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }
      .frame {
        width: 148mm;
        height: 105mm;
        max-width: none;
        aspect-ratio: auto;
        box-shadow: none;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <article class="frame" aria-label="Листівка">
    <div class="sky" aria-hidden="true"></div>
    <div class="stars" aria-hidden="true">
      <svg viewBox="0 0 400 560" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <g fill="#eef2ff">
          <circle cx="42" cy="38" r="0.55" opacity="0.85" />
          <circle cx="118" cy="22" r="0.35" opacity="0.5" />
          <circle cx="200" cy="48" r="0.45" opacity="0.7" />
          <circle cx="312" cy="31" r="0.4" opacity="0.55" />
          <circle cx="368" cy="72" r="0.5" opacity="0.75" />
          <circle cx="28" cy="120" r="0.3" opacity="0.4" />
          <circle cx="95" cy="98" r="0.55" opacity="0.9" />
          <circle cx="162" cy="140" r="0.35" opacity="0.45" />
          <circle cx="248" cy="88" r="0.45" opacity="0.65" />
          <circle cx="330" cy="118" r="0.32" opacity="0.5" />
          <circle cx="382" cy="155" r="0.48" opacity="0.8" />
          <circle cx="55" cy="188" r="0.38" opacity="0.55" />
          <circle cx="140" cy="205" r="0.42" opacity="0.6" />
          <circle cx="288" cy="182" r="0.36" opacity="0.48" />
          <circle cx="350" cy="220" r="0.52" opacity="0.88" />
          <circle cx="18" cy="255" r="0.34" opacity="0.42" />
          <circle cx="220" cy="242" r="0.44" opacity="0.68" />
          <circle cx="305" cy="268" r="0.3" opacity="0.38" />
          <circle cx="78" cy="298" r="0.5" opacity="0.72" />
          <circle cx="175" cy="318" r="0.33" opacity="0.46" />
          <circle cx="360" cy="305" r="0.46" opacity="0.62" />
        </g>
        <g fill="#fff" opacity="0.35">
          <circle cx="130" cy="55" r="1.1" />
          <circle cx="268" cy="42" r="0.9" />
          <circle cx="88" cy="165" r="1" />
        </g>
      </svg>
    </div>
    <div class="haze" aria-hidden="true"></div>
    <div class="moon" aria-hidden="true">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <clipPath id="moonClip" clipPathUnits="userSpaceOnUse">
            <circle cx="50" cy="50" r="42" />
          </clipPath>
          <radialGradient id="moonFace" cx="32%" cy="32%" r="72%">
            <stop offset="0%" stop-color="#fffcf5" />
            <stop offset="35%" stop-color="#f0e8d8" />
            <stop offset="72%" stop-color="#d4c8b4" />
            <stop offset="100%" stop-color="#a89888" />
          </radialGradient>
          <radialGradient id="earthshine" cx="58%" cy="48%" r="62%">
            <stop offset="0%" stop-color="#b4c0d4" />
            <stop offset="55%" stop-color="#6d7588" />
            <stop offset="100%" stop-color="#454a58" />
          </radialGradient>
          <mask id="youngCrescent" maskUnits="userSpaceOnUse">
            <rect width="100" height="100" fill="black" />
            <circle cx="50" cy="50" r="42" fill="white" />
            <circle cx="26" cy="51" r="39" fill="black" />
          </mask>
          <!-- Тільки «темний» бік диска (перетин місяця зі зміщеним колом), без освітленого серпа -->
          <mask id="unlitFace" maskUnits="userSpaceOnUse">
            <rect width="100" height="100" fill="black" />
            <g clip-path="url(#moonClip)">
              <circle cx="26" cy="51" r="39" fill="white" />
            </g>
          </mask>
          <filter id="lunarTex" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="5" seed="4" result="n" />
            <feColorMatrix
              in="n"
              type="matrix"
              values="0.5 0 0 0 0.5  0 0.48 0 0 0.47  0 0 0.45 0 0.44  0 0 0 0.22 0"
              result="tint" />
            <feBlend in="SourceGraphic" in2="tint" mode="overlay" result="blended" />
            <feGaussianBlur in="blended" stdDeviation="0.15" />
          </filter>
          <filter id="softLimb" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="0.45" />
          </filter>
        </defs>
        <circle cx="50" cy="50" r="42" fill="url(#earthshine)" opacity="0.45" mask="url(#unlitFace)" filter="url(#softLimb)" />
        <circle cx="50" cy="50" r="42" fill="url(#moonFace)" mask="url(#youngCrescent)" filter="url(#lunarTex)" />
      </svg>
    </div>
    <div class="card-inner">
      <div class="ornament" aria-hidden="true"></div>
      <div class="verse">
        <p>Засинай, я завжди поруч у твоїх думках</p>
        <p>І навіть, якщо розділяє нас</p>
        <p>Світло і тінь <span class="whisper">(тінь)</span></p>
        <p>День або ніч <span class="whisper">(ніч)</span></p>
      </div>
    </div>
    <div class="edge-fade" aria-hidden="true"></div>
  </article>
</body>
</html>
